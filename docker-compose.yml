version: '3.8'

services:
  db:
    image: postgres:13
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    networks:
      - inventory_network

  web:
    build:
      context: .  # El contexto de construcción es el directorio actual
      dockerfile: Dockerfile
    command: gunicorn inventory_system.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/usr/src/app  # Monta todo el proyecto en /usr/src/app
      - static_volume:/usr/src/app/static  
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      - db
    networks:
      - inventory_network
    expose:
      - 8000

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/usr/src/app/static
    depends_on:
      - web
    networks:
      - inventory_network

volumes:
  postgres_data:
  static_volume:
  
networks:
  inventory_network:
    driver: bridge