{% extends "inventory/base.html" %}

{% block title %}Generar Reporte{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">Generar Reporte de Inventario</h4>
            </div>
            <div class="card-body">
                <form method="post" action="{% url 'inventory:generate_report' %}">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Generar Reporte</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
